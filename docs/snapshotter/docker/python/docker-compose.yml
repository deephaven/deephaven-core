services:
  server:
    image: ${DEEPHAVEN_SERVER_IMAGE}
    expose:
      - 10000
    volumes:
      - ../data:/data
    environment:
      - START_OPTS=-Xmx4g -DAuthHandlers=io.deephaven.auth.AnonymousAuthenticationHandler -Ddeephaven.console.type=python
    depends_on:
      examples:
        condition: service_completed_successfully

  examples:
    image: ghcr.io/deephaven/examples:latest
    volumes:
      - ../data:/data
    command: download

networks:
  default:
    name: deephaven-docs-snapshot-network
    external: true