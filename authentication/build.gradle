plugins {
    id 'java-library'
    id 'io.deephaven.project.register'
}

description 'authentication: Deephaven authentication and identity'

dependencies {
    implementation project(':log-factory')
    implementation project(':Configuration')

    implementation libs.arrow.flight.core
    api(enforcedPlatform(libs.netty.bom)) {
        because 'Ensures we use a consistent version of netty for grpc'
    }
}
